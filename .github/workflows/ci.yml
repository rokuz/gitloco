name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest -q

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # esbuild's postinstall execs the binary it just wrote, which can hit a
        # transient ETXTBSY (text-file-busy) on container overlay filesystems.
        # Retry a couple of times to ride out the race.
        run: |
          for attempt in 1 2 3; do
            if npm ci --no-fund --no-audit; then
              exit 0
            fi
            echo "npm ci failed (attempt $attempt) — retrying after cleanup…"
            rm -rf node_modules
            sleep 5
          done
          echo "npm ci failed after 3 attempts" >&2
          exit 1

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm test

      - name: Build
        run: npm run build
